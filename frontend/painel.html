<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blu — Painel de Indicações</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/validacao.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="js/painel.js"></script>
</head>

<body class="bg-gray-50 min-h-screen font-sans">

  <header class="bg-blue-700 text-white py-5 px-6 shadow">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Blu · Engajamento Comercial</h1>
        <p class="text-blue-200 text-sm mt-1">Painel de indicações cadastradas</p>
      </div>
      <nav class="text-sm">
        <a href="index.html" class="px-3 py-1.5 rounded hover:bg-blue-800">Formulário</a>
        <a href="painel.html" class="px-3 py-1.5 rounded bg-blue-800 font-semibold">Painel</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10" x-data="painelIndicacoes()" x-init="carregar()">

    <!-- Barra de busca -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input
        type="text"
        x-model="busca"
        placeholder="Buscar por executivo ou CNPJ da indústria..."
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <button
        @click="carregar()"
        class="px-4 py-2.5 text-sm rounded-lg bg-white border border-gray-300 hover:bg-gray-50 font-medium text-gray-700"
      >Atualizar</button>
    </div>

    <!-- Estados de carregamento / erro -->
    <div x-show="carregando" class="space-y-2">
      <template x-for="i in 3" :key="i">
        <div class="bg-white border border-gray-200 rounded-xl p-5 animate-pulse">
          <div class="h-4 bg-gray-200 rounded w-1/3 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2"></div>
        </div>
      </template>
    </div>

    <div x-show="erro" class="bg-red-100 border border-red-400 text-red-800 rounded-lg px-5 py-4">
      Não foi possível carregar as indicações.
      <button @click="carregar()" class="underline ml-2">Tentar novamente</button>
    </div>

    <!-- Lista -->
    <div x-show="!carregando && !erro">
      <p x-show="resultadosFiltrados().length === 0" class="text-sm text-gray-500">
        Nenhuma indicação encontrada.
      </p>

      <!-- Tabela (desktop) -->
      <div class="hidden md:block bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden"
           x-show="resultadosFiltrados().length > 0">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wide">
            <tr>
              <th class="text-left px-4 py-3">Executivo</th>
              <th class="text-left px-4 py-3">CNPJ Indústria</th>
              <th class="text-left px-4 py-3">Representante</th>
              <th class="text-left px-4 py-3">Qtd. Varejistas</th>
              <th class="text-left px-4 py-3">Data</th>
              <th class="w-8"></th>
            </tr>
          </thead>
          <template x-for="item in resultadosFiltrados()" :key="item.id">
            <tbody>
              <tr class="border-t border-gray-100 hover:bg-blue-50/30 cursor-pointer"
                  @click="expandido === item.id ? expandido = null : expandido = item.id">
                <td class="px-4 py-3 font-medium text-gray-800" x-text="item.executivo"></td>
                <td class="px-4 py-3 text-gray-600 font-mono text-xs" x-text="Validacao.mascararCNPJ(item.cnpj_industria)"></td>
                <td class="px-4 py-3 text-gray-600 font-mono text-xs" x-text="formatarDoc(item.doc_representante)"></td>
                <td class="px-4 py-3 text-gray-600" x-text="contarVarejistas(item.cnpjs_varejistas)"></td>
                <td class="px-4 py-3 text-gray-500 text-xs" x-text="formatarData(item.criado_em)"></td>
                <td class="px-4 py-3 text-gray-400" x-text="expandido === item.id ? '▲' : '▼'"></td>
              </tr>
              <tr x-show="expandido === item.id" class="bg-blue-50/30 border-t border-blue-100">
                <td colspan="6" class="px-4 py-4">
                  <div class="text-xs text-gray-600 uppercase tracking-wide mb-2">CNPJs dos varejistas</div>
                  <ul class="list-disc list-inside text-sm text-gray-700 font-mono space-y-0.5 mb-3">
                    <template x-for="cnpj in listarVarejistas(item.cnpjs_varejistas)" :key="cnpj">
                      <li x-text="Validacao.mascararCNPJ(cnpj)"></li>
                    </template>
                  </ul>
                  <template x-if="item.detalhes">
                    <div>
                      <div class="text-xs text-gray-600 uppercase tracking-wide mb-1">Detalhes</div>
                      <p class="text-sm text-gray-700 whitespace-pre-wrap" x-text="item.detalhes"></p>
                    </div>
                  </template>
                </td>
              </tr>
            </tbody>
          </template>
        </table>
      </div>

      <!-- Cards (mobile) -->
      <div class="md:hidden space-y-3" x-show="resultadosFiltrados().length > 0">
        <template x-for="item in resultadosFiltrados()" :key="item.id">
          <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm"
               @click="expandido === item.id ? expandido = null : expandido = item.id">
            <div class="flex justify-between items-start">
              <div>
                <p class="font-semibold text-gray-800" x-text="item.executivo"></p>
                <p class="text-xs text-gray-500 mt-0.5" x-text="formatarData(item.criado_em)"></p>
              </div>
              <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-medium"
                    x-text="`${contarVarejistas(item.cnpjs_varejistas)} varejistas`"></span>
            </div>
            <div class="mt-3 text-sm text-gray-600 space-y-1 font-mono text-xs">
              <p><span class="font-sans font-medium">Indústria:</span> <span x-text="Validacao.mascararCNPJ(item.cnpj_industria)"></span></p>
              <p><span class="font-sans font-medium">Representante:</span> <span x-text="formatarDoc(item.doc_representante)"></span></p>
            </div>
            <div x-show="expandido === item.id" class="mt-3 pt-3 border-t border-gray-100">
              <div class="text-xs text-gray-600 uppercase tracking-wide mb-2">Varejistas</div>
              <ul class="list-disc list-inside text-xs text-gray-700 font-mono space-y-0.5 mb-3">
                <template x-for="cnpj in listarVarejistas(item.cnpjs_varejistas)" :key="cnpj">
                  <li x-text="Validacao.mascararCNPJ(cnpj)"></li>
                </template>
              </ul>
              <template x-if="item.detalhes">
                <p class="text-sm text-gray-700 whitespace-pre-wrap" x-text="item.detalhes"></p>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

  </main>
</body>
</html>
